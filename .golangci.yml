version: "2"

run:
  timeout: 5m

output:
  formats:
    text:
      path: stdout
      colors: true

formatters:
  enable:
    - goimports

linters:
  enable:
    - errcheck
    - govet
    - misspell
    - staticcheck
    - unused
    - unparam
  exclusions:
    rules:
      - path: .+\.go$
        text: "exported \\w+ (\\S*['.]*)([a-zA-Z'.*]*) should have comment( \\(or a comment on this block\\))? or be unexported"
      - path: .+\.go$
        text: "Error return value of .((os\\.)?std(out|err)\\..*|.*Close|.*Flush|os\\.Remove(All)?|.*printf?|os\\.(Un)?Setenv). is not checked"
